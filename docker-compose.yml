# Phira MP 一键栈：server + Redis，可选 Agent profile。
#
#   cp .env.example .env      # 按需填 ADMIN_TOKEN 等
#   docker compose up -d --build
#   docker compose logs -f phira-mp
#   # 启用 Agent 前，将 AGENT_IPC_ENDPOINT 改为 unix:///data/agent.sock，
#   # 并将 AGENT_CONFIG_FILE 指向实际配置，再执行：
#   docker compose --profile agent up -d --build
#
# 数据（配置/日志/回放/缓存/封禁数据）持久化在具名卷 phira-data。

name: phira-mp

services:
  phira-mp:
    build:
      context: .
      args:
        VERSION: ${VERSION:-}
    image: phira-mp:local
    restart: unless-stopped
    ports:
      - "${GAME_PORT:-12346}:12346"   # TCP 游戏服务
      - "${HTTP_PORT:-12347}:12347"   # HTTP API
    environment:
      # —— 服务监听 ——
      HOST: "::"
      PORT: "12346"
      HTTP_SERVICE: "true"
      HTTP_PORT: "12347"
      # —— 管理 / 运行参数（从 .env 注入，留空则管理接口禁用）——
      ADMIN_TOKEN: "${ADMIN_TOKEN:-}"
      LOG_LEVEL: "${LOG_LEVEL:-INFO}"
      PHIRA_MP_LANG: "${PHIRA_MP_LANG:-zh-CN}"
      ROOM_MAX_USERS: "${ROOM_MAX_USERS:-512}"
      TZ: "${TZ:-Asia/Shanghai}"
      # —— 可选 Agent IPC ——
      AGENT_IPC_ENDPOINT: "${AGENT_IPC_ENDPOINT:-disabled}"
      AGENT_IPC_DISCOVERY_FILE: "/data/agent-ipc.json"
      AGENT_OUTBOX_DIR: "/data/agent-outbox"
      # —— Redis 多实例共享缓存 ——
      REDIS_ENABLED: "true"
      REDIS_HOST: "redis"
      REDIS_PORT: "6379"
    volumes:
      - phira-data:/data
      # redis.yaml 的存在启用 Redis；连接地址继续由上面的环境变量覆盖。
      - ./config.example/redis.yaml:/data/config/redis.yaml:ro
    depends_on:
      redis:
        condition: service_healthy

  phira-mp-agent:
    profiles: [agent]
    image: phira-mp:local
    restart: unless-stopped
    entrypoint: ["phira-mp-agent"]
    environment:
      TZ: "${TZ:-Asia/Shanghai}"
    volumes:
      - phira-data:/data
      - "${AGENT_CONFIG_FILE:-./config.example/agent.yaml}:/data/config/agent.yaml:ro"
    depends_on:
      phira-mp:
        condition: service_healthy
    healthcheck:
      disable: true

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    # 轻量持久化：60s 内有 ≥1 次写则快照；高频缓存场景关掉 AOF。
    command: ["redis-server", "--save", "60", "1", "--appendonly", "no"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  phira-data:
  redis-data:
