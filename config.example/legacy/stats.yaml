# 持久化统计配置（旧主程序迁移参考，不能直接用于当前 Agent）
#
# 主程序不再打开 SQLite。请将这些值迁移到 config/agent.yaml 的 STATS 块，
# 并让 Agent 的 DB_PATH 指向现有数据库文件以保留历史数据。

# 配置格式版本。必须保留，当前只支持 1。
version: 1

# SQLite 数据库文件路径，默认 stats.db。
# 相对路径以服务端工作目录为基准；确保运行用户拥有目录写权限。
STATS_DB_PATH: "stats.db"

# 对局明细保留天数，默认 90。
# 超期的 match_results 明细会每日清理；聚合统计不受影响。
# 填 0 表示不保留历史明细，但聚合数据仍会继续累计。
STATS_DETAIL_RETENTION_DAYS: 90

# 数据库文件大小上限，单位 MB，默认 500，必须为正整数。
# 超过上限时会优先清理最旧明细并执行空间整理。
STATS_DB_MAX_MB: 500
