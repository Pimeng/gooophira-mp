# Agent 独占的扩展配置。
# 将本文件复制到 config/agent.yaml，再正常启动 phira-mp-agent。
# 部署、systemd、Windows、迁移和故障排查说明见 docs/agent.md。
# server 不会加载本文件，也不会使用其中的扩展凭据。
version: 1
ENABLED: false
TIMEOUT_MS: 5000
RETRIES: 2
# 通用 JSON 示例。所有目标类型见 legacy/webhook.yaml。
TARGETS: []
# TARGETS:
#   - TYPE: generic
#     ID: primary-generic
#     URL: "https://example.com/hook"
#     EVENTS: [room_create, game_start, game_end]

STATS:
  ENABLED: false
  DB_PATH: stats.db
  DETAIL_RETENTION_DAYS: 90
  DB_MAX_MB: 500

# 可选回放上传。BASE_DIR 必须指向 server 的回放根目录。
REPLAY_UPLOAD:
  ENABLED: false
  AUTO_UPLOAD: false
  BASE_DIR: "./record"
  URL: ""
  TOKEN: ""
  STATE_PATH: agent-inbox/upload-state.json
  DELAY_MS: 30000
