# 回放录制配置
#
# 将本文件复制为 config/replay.yaml 即启用回放扩展。
# REPLAY_ENABLED 省略时默认为 true；删除本文件会关闭回放并结束正在进行的录制。
# 修改录制目录和保留天数可自动热重载。

# 配置格式版本。必须保留，当前只支持 1。
version: 1

# 是否实际录制回放。本文件存在时默认 true。
# 可设为 false 暂停录制并保留其它参数；通常直接删除本文件更清晰。
# REPLAY_ENABLED: true

# .phirarec 回放文件保存目录，默认 ./record。
# 相对路径以服务端工作目录为基准；确保运行用户拥有写权限。
REPLAY_BASE_DIR: "./record"

# 回放文件保留天数，默认 4，范围 1~3650。
# 服务端启动时和之后每天清理超过该期限的回放；长期留存请另行备份。
REPLAY_TTL_DAYS: 4

# 分享站手动上传和自动上传已由可选 Agent 独占。
# 请在 config/agent.yaml 的 REPLAY_UPLOAD 块配置 BASE_DIR、URL 和 TOKEN，
# 并确保 BASE_DIR 与此处 REPLAY_BASE_DIR 指向同一目录。
# 旧 REPLAY_AUTO_UPLOAD / SHARE_STATION 字段仍可用于迁移识别，但新部署不要使用。
# REPLAY_AUTO_UPLOAD: false
# SHARE_STATION:
#   URL: ""
#   TOKEN: ""
