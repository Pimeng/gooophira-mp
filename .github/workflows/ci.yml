name: CI

# 每次推送与 PR 运行测试、静态检查与跨平台编译校验。
# 发布版本时的完整产物矩阵见 release-on-version-bump.yml。
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: ci-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ── 测试 + 静态检查 ──
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: 下载依赖
        run: go mod download

      - name: 静态检查
        run: go vet ./...

      - name: 运行测试
        run: go test -race -count=1 ./...

  # ── 跨平台编译校验 ──
  build-matrix:
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux
          - goos: linux
            goarch: amd64
            name: linux-x64
          - goos: linux
            goarch: arm64
            name: linux-arm64
          - goos: linux
            goarch: riscv64
            name: linux-riscv64
          # Windows
          - goos: windows
            goarch: amd64
            name: windows-x64
          - goos: windows
            goarch: arm64
            name: windows-arm64
          # macOS
          - goos: darwin
            goarch: amd64
            name: macos-x64
          - goos: darwin
            goarch: arm64
            name: macos-arm64
          # FreeBSD
          - goos: freebsd
            goarch: amd64
            name: freebsd-x64
          - goos: freebsd
            goarch: arm64
            name: freebsd-arm64
          # Android / Termux（arm64，Termux 环境可直接运行）
          - goos: android
            goarch: arm64
            name: termux-arm64
          # OpenBSD / NetBSD（小众但零成本）
          - goos: openbsd
            goarch: amd64
            name: openbsd-x64
          - goos: netbsd
            goarch: amd64
            name: netbsd-x64
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: 编译 ${{ matrix.goos }}/${{ matrix.goarch }}
        env:
          CGO_ENABLED: '0'
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          ext=""
          [ "$GOOS" = "windows" ] && ext=".exe"
          BIN="phira-mp$ext"
          echo "▶ 编译 $GOOS/$GOARCH → $BIN"
          go build -trimpath -ldflags "-s -w" -o "$BIN" ./cmd/server
          file "$BIN" || true
          ls -lh "$BIN"
