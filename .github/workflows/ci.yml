name: CI

# 每次推送与 PR 运行测试、静态检查与跨平台编译校验。
# 发布版本时的完整产物矩阵见 release-on-version-bump.yml。
on:
  push:
    branches: [main]
    paths:
      - 'internal/**'
      - '!internal/l10n/locales/**'
      - go.mod
      - go.sum
  pull_request:
    branches: [main]
    paths:
      - 'internal/**'
      - '!internal/l10n/locales/**'
      - go.mod
      - go.sum
  workflow_dispatch: {}

concurrency:
  group: ci-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ── 测试 + 静态检查 ──
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: 下载依赖
        run: go mod download

      - name: 静态检查
        run: go vet ./...

      - name: 运行测试
        run: go test -race -count=1 ./...

  # ── 跨平台编译校验（单 runner 交叉编译，无矩阵开销）──
  build:
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: 交叉编译全部目标平台（并行）
        env:
          CGO_ENABLED: '0'
        run: |
          printf '%s\n' \
            "linux amd64 linux-x64" \
            "linux arm64 linux-arm64" \
            "linux riscv64 linux-riscv64" \
            "windows amd64 windows-x64" \
            "windows arm64 windows-arm64" \
            "darwin amd64 macos-x64" \
            "darwin arm64 macos-arm64" \
            "freebsd amd64 freebsd-x64" \
            "freebsd arm64 freebsd-arm64" \
            "android arm64 termux-arm64" \
            "openbsd amd64 openbsd-x64" \
            "netbsd amd64 netbsd-x64" \
          | xargs -P $(nproc) -L 1 sh -c '
            goos="$1"; goarch="$2"; name="$3"
            ext=""; [ "$goos" = "windows" ] && ext=".exe"
            out="phira-mp-$name$ext"
            echo "▶ 编译 $goos/$goarch → $out"
            GOOS="$goos" GOARCH="$goarch" go build -trimpath -o "$out" ./cmd/server
            ls -lh "$out"
            rm -f "$out"
          ' _
