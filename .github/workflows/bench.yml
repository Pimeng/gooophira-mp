name: Bench

on:
  push:
    branches: [main]
    paths:
      - 'cmd/bench/**'
      - 'cmd/tcpconnectbench/**'
      - 'internal/**'
      - go.mod
      - go.sum
  pull_request:
    branches: [main]
    paths:
      - 'cmd/bench/**'
      - 'cmd/tcpconnectbench/**'
      - 'internal/**'
      - go.mod
      - go.sum
  workflow_dispatch:
    inputs:
      duration:
        default: '15s'
        type: choice
        options: [10s, 15s, 30s, 60s]
      clients:
        default: '10000'
        type: choice
        options: [1000, 10000, 50000, 80000]
      rooms:
        default: '1000'
        type: choice
        options: [100, 1000, 4000, 8000]
      scenario:
        default: 'gameplay'
        type: choice
        options: [room-cycle, gameplay, connection-storm, steady-state, mixed]
      tcp-duration:
        default: '30s'
        type: choice
        options: [10s, 15s, 30s, 60s]
      tcp-clients:
        default: '50'
        type: choice
        options: [10, 50, 100, 200, 500]
      tcp-rooms:
        default: '5'
        type: choice
        options: [0, 5, 10, 20, 50]
      tcp-scenario:
        default: 'connection-storm'
        type: choice
        options: [room-cycle, gameplay, connection-storm, steady-state]

concurrency:
  group: bench-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  bench:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version-file: go.mod }
      - run: go mod download

      # ----- 微基准测试 -----

      - name: run micro benchmarks
        run: |
          mkdir -p tmp/profiles/micro
          # go test 的 -cpuprofile/-memprofile 不支持多包同时测试，按包分别运行
          for pkg in ./internal/protocol/... ./internal/server/...; do
            tag="${pkg%/...}"; tag="${tag##*/}"
            go test -bench=Benchmark -benchmem -count=3 \
              -cpuprofile="tmp/profiles/micro/cpu_${tag}.out" \
              -memprofile="tmp/profiles/micro/mem_${tag}.out" \
              -run='^$' \
              "$pkg" 2>&1 | tee -a tmp/profiles/micro/bench.txt
          done

      - name: run micro benchmarks (lock profiles)
        run: |
          go test -bench=Benchmark -benchmem -count=1 \
            -mutexprofile=tmp/profiles/micro/mutex.out \
            -blockprofile=tmp/profiles/micro/block.out \
            -run='^$' \
            ./internal/server/ 2>&1 | tee -a tmp/profiles/micro/bench.txt

      - name: micro summary
        if: always()
        run: |
          {
            echo "## Micro Benchmarks"
            echo "| Benchmark | ns/op | B/op | allocs/op |"
            echo "|---|---:|---:|---:|"
            awk '/^Benchmark/ {
              printf "| %s | %s %s | %s %s | %s %s |\n", $1, $3, $4, $5, $6, $7, $8
            }' tmp/profiles/micro/bench.txt | sort -u
          } >> "$GITHUB_STEP_SUMMARY"

      # ----- 负载测试 -----

      - name: run load test
        run: |
          mkdir -p tmp/profiles/load
          go run ./cmd/bench/ \
            -clients="${{ github.event.inputs.clients || '10000' }}" \
            -rooms="${{ github.event.inputs.rooms || '1000' }}" \
            -duration="${{ github.event.inputs.duration || '15s' }}" \
            -scenario="${{ github.event.inputs.scenario || 'gameplay' }}" \
            -profile=all -profile-dir=./tmp/profiles/load \
            -json > tmp/profiles/load/result.json

      - name: load summary
        if: always()
        run: |
          if [[ -s tmp/profiles/load/result.json ]]; then
            jq -r '
              if (.results | length) > 0 then
                .results[0] as $r |
                (($r.cmd_latency.count // 0) > 0) as $has_lat |
                ($r.duration // 0) as $dur_ns |
                "## Load Test - \($r.name)",
                "",
                "| Metric | Value |",
                "|---|---|",
                "| Clients | \($r.config.clients // "N/A") |",
                "| Rooms | \($r.config.rooms // "N/A") |",
                "| Duration | \(if $dur_ns > 0 then ($dur_ns / 1000000000) else 0 end)s |",
                "| Throughput | \((($r.throughput.avg_cmds_per_sec // 0) * 100 | floor) / 100) cmd/s |",
                "| Cycles/sec | \(if $dur_ns > 0 then ((($r.throughput.cycles_completed // 0) / ($dur_ns / 1000000000)) * 100 | floor) / 100 else 0 end) |",
                "| Latency avg/min/max | \(if $has_lat then "\(($r.cmd_latency.mean // 0)/1000 | floor)us / \(($r.cmd_latency.min // 0)/1000 | floor)us / \(($r.cmd_latency.max // 0)/1000 | floor)us" else "N/A" end) |",
                "| Latency p50/p90/p99 | \(if $has_lat then "\(($r.cmd_latency.p50 // 0)/1000 | floor)us / \(($r.cmd_latency.p90 // 0)/1000 | floor)us / \(($r.cmd_latency.p99 // 0)/1000 | floor)us" else "N/A" end) |",
                "| Peak goroutines | \($r.runtime.peak_goroutines // "N/A") |",
                "| Peak heap | \((($r.runtime.peak_heap_mb // 0) * 10 | floor) / 10) MB |",
                "| GC count | \($r.runtime.num_gc // "N/A") |",
                "| Errors | \($r.errors.total // 0) |",
                ""
              else
                "## Load Test",
                "",
                "_(no results — bench failed to produce output)_",
                ""
              end
            ' tmp/profiles/load/result.json >> "$GITHUB_STEP_SUMMARY"
          else
            {
              echo "## Load Test"
              echo ""
              echo "_(no result — bench failed to produce output)_"
              echo ""
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      # ----- TCP 连接负载测试 -----

      - name: run TCP connect load test
        run: |
          mkdir -p tmp/profiles/tcpconnect
          go run ./cmd/tcpconnectbench/ \
            -clients="${{ github.event.inputs.tcp-clients || '50' }}" \
            -rooms="${{ github.event.inputs.tcp-rooms || '5' }}" \
            -duration="${{ github.event.inputs.tcp-duration || '20s' }}" \
            -scenario="${{ github.event.inputs.tcp-scenario || 'connection-storm' }}" \
            -profile=all -profile-dir=./tmp/profiles/tcpconnect \
            -json > tmp/profiles/tcpconnect/result.json

      - name: TCP connect load summary
        if: always()
        run: |
          if [[ -s tmp/profiles/tcpconnect/result.json ]]; then
            jq -r '
              if (.results | length) > 0 then
                .results[0] as $r |
                (($r.cmd_latency.count // 0) > 0) as $has_lat |
                ($r.duration // 0) as $dur_ns |
                "## TCP Connect Load Test - \($r.name)",
                "",
                "| Metric | Value |",
                "|---|---|",
                "| Clients | \($r.config.clients // "N/A") |",
                "| Rooms | \($r.config.rooms // "N/A") |",
                "| Duration | \(if $dur_ns > 0 then ($dur_ns / 1000000000) else 0 end)s |",
                "| Throughput | \((($r.throughput.avg_cmds_per_sec // 0) * 100 | floor) / 100) cmd/s |",
                "| TCP connect avg/min/max | \(($r.connect_latency.mean // 0)/1000 | floor)us / \(($r.connect_latency.min // 0)/1000 | floor)us / \(($r.connect_latency.max // 0)/1000 | floor)us |",
                "| TCP connect p50/p90/p99 | \(($r.connect_latency.p50 // 0)/1000 | floor)us / \(($r.connect_latency.p90 // 0)/1000 | floor)us / \(($r.connect_latency.p99 // 0)/1000 | floor)us |",
                "| Auth RTT avg/min/max | \(($r.auth_latency.mean // 0)/1000 | floor)us / \(($r.auth_latency.min // 0)/1000 | floor)us / \(($r.auth_latency.max // 0)/1000 | floor)us |",
                "| Auth RTT p50/p90/p99 | \(($r.auth_latency.p50 // 0)/1000 | floor)us / \(($r.auth_latency.p90 // 0)/1000 | floor)us / \(($r.auth_latency.p99 // 0)/1000 | floor)us |",
                "| Cmd latency avg/min/max | \(if $has_lat then "\(($r.cmd_latency.mean // 0)/1000 | floor)us / \(($r.cmd_latency.min // 0)/1000 | floor)us / \(($r.cmd_latency.max // 0)/1000 | floor)us" else "N/A" end) |",
                "| Cmd latency p50/p90/p99 | \(if $has_lat then "\(($r.cmd_latency.p50 // 0)/1000 | floor)us / \(($r.cmd_latency.p90 // 0)/1000 | floor)us / \(($r.cmd_latency.p99 // 0)/1000 | floor)us" else "N/A" end) |",
                "| Peak goroutines | \($r.runtime.peak_goroutines // "N/A") |",
                "| Peak heap | \((($r.runtime.peak_heap_mb // 0) * 10 | floor) / 10) MB |",
                "| GC count | \($r.runtime.num_gc // "N/A") |",
                "| Errors | \($r.errors.total // 0) |",
                ""
              else
                "## TCP Connect Load Test",
                "",
                "_(no results — bench failed to produce output)_",
                ""
              end
            ' tmp/profiles/tcpconnect/result.json >> "$GITHUB_STEP_SUMMARY"
          else
            {
              echo "## TCP Connect Load Test"
              echo ""
              echo "_(no result — bench failed to produce output)_"
              echo ""
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      # ----- 上传结果 -----

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bench-results-${{ github.sha }}
          path: tmp/profiles/
          retention-days: 30
