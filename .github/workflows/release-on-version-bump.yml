name: 版本号变更时自动发布

# Go 项目的版本号唯一来源是 internal/version/VERSION（参见 internal/version/version.go，
# 通过 go:embed 内嵌进二进制）。push 到 main 且该文件版本相对「上一个提交」升高时：
#   交叉编译各平台二进制 → 创建 GitHub Release 并上传产物 → 镜像该 Release 到 CNB。
on:
  push:
    branches: [main]
    paths:
      - internal/version/VERSION

concurrency:
  group: release-on-version-bump-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  check-version:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      should_release: ${{ steps.check.outputs.should_release }}
      version: ${{ steps.check.outputs.version }}
      prerelease: ${{ steps.check.outputs.prerelease }}
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 需要父提交来比对版本

      - name: 比对 VERSION 是否相对上一提交升高
        id: check
        run: |
          current=$(tr -d ' \t\r\n' < internal/version/VERSION)
          echo "version=$current" >> "$GITHUB_OUTPUT"

          # 关键：与「当前提交的父提交」HEAD~1（即上一个提交）比对，而非 github.event.before。
          # 一次 push 多个提交时 before 会指向更早的提交；用 HEAD~1 才严格对应上一个提交。
          # 因此版本号 bump 应作为该次 push 的最新提交（建议单独成一个提交）。
          previous=""
          if git rev-parse -q --verify HEAD~1 >/dev/null 2>&1; then
            previous=$(git show HEAD~1:internal/version/VERSION 2>/dev/null | tr -d ' \t\r\n')
          fi
          [ -z "$previous" ] && previous="0.0.0" # 首个提交无父提交
          echo "上一提交版本：$previous → 当前版本：$current"

          if [ "$current" = "$previous" ]; then
            should_release=false
          elif [ "$(printf '%s\n%s\n' "$previous" "$current" | sort -V | tail -n1)" = "$current" ]; then
            should_release=true
          else
            should_release=false
          fi
          echo "should_release=$should_release" >> "$GITHUB_OUTPUT"

          case "$current" in *-*) prerelease=true ;; *) prerelease=false ;; esac
          echo "prerelease=$prerelease" >> "$GITHUB_OUTPUT"

          if [ "$should_release" = "true" ]; then
            echo "✅ 版本升高，准备发布 v$current（预发布=$prerelease）"
          else
            echo "ℹ️ 版本未升高（$previous → $current），跳过发布"
          fi

  build:
    needs: check-version
    if: needs.check-version.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: 交叉编译各平台并打包
        env:
          CGO_ENABLED: '0' # 纯 Go（仅依赖 yaml.v3），静态交叉编译
        run: |
          # 纯 Go 项目无需各系统单独起 runner，单机交叉编译全部目标即可。
          # 每行：GOOS GOARCH 产物名后缀。
          targets="
          linux   amd64 linux-x64
          linux   arm64 linux-arm64
          windows amd64 windows-x64
          darwin  arm64 macos-arm64
          darwin  amd64 macos-x64
          freebsd amd64 freebsd-x64
          android arm64 termux-arm64
          "
          mkdir -p dist
          echo "$targets" | while read -r goos goarch name; do
            [ -z "$goos" ] && continue
            ext=""; [ "$goos" = "windows" ] && ext=".exe"
            BIN="phira-mp$ext"
            echo "▶ 编译 $goos/$goarch → $name"
            # 版本号经 go:embed 内嵌，无需 ldflags 注入；-s -w/-trimpath 仅瘦身与去除本地路径。
            GOOS="$goos" GOARCH="$goarch" go build -trimpath -ldflags "-s -w" -o "$BIN" ./cmd/server
            if [ "$goos" = "windows" ]; then
              mv "$BIN" "dist/phira-mp-$name.exe"
            else
              tar -czf "dist/phira-mp-$name.tar.gz" "$BIN"
              rm -f "$BIN"
            fi
          done
          ls -lh dist

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: phira-mp-binaries
          path: dist/*
          if-no-files-found: error

  release:
    needs: [check-version, build]
    if: needs.check-version.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write # 创建 tag / Release
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 下载全部构建产物
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true # 所有平台产物汇到 artifacts/ 一层

      - name: 生成自定义 Release Notes
        id: notes
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: v${{ needs.check-version.outputs.version }}
        run: |
          PREVIOUS_VERSION=$(gh release list --limit 100 --json tagName,isPrerelease \
            --jq '[.[] | select(.isPrerelease == false) | .tagName] | .[0]' 2>/dev/null || echo "")

          if [ -z "$PREVIOUS_VERSION" ]; then
            echo "未找到上一个 release，读取所有提交"
            COMMITS=$(git log --pretty=format:"%s")
          else
            echo "找到上一个 release 版本: ${PREVIOUS_VERSION}"
            git fetch --tags origin

            if git rev-parse "refs/tags/${PREVIOUS_VERSION}" >/dev/null 2>&1; then
              echo "从远程 tag ${PREVIOUS_VERSION} 到 HEAD 对比提交"
              COMMITS=$(git log ${PREVIOUS_VERSION}..HEAD --pretty=format:"%s")
            else
              echo "警告: 远程 tag ${PREVIOUS_VERSION} 不存在，读取所有提交"
              COMMITS=$(git log --pretty=format:"%s")
            fi
          fi

          # 有的提交把多个 conventional 段塞进同一行（如 "feat: A refactor: B"）。
          # 在每个内嵌的 "<type>:" 前断行，让每段各自归类。
          COMMITS=$(printf '%s\n' "$COMMITS" \
            | sed -E 's/[[:space:]]+(feat|fix|perf|refactor|improvement|chore|i18n|docs|test|ci|build|style|revert)(\([^)]*\))?:[[:space:]]/\n\1\2: /gI')

          FEATURES=""
          FIXES=""
          IMPROVEMENTS=""
          OTHERS=""

          shopt -s nocasematch

          while IFS= read -r line; do
            [[ -z "$line" ]] && continue

            if [[ $line =~ ^feat(\(.*\))?:\ (.*) ]]; then
              FEATURES+="* ${BASH_REMATCH[2]}"$'\n'
            elif [[ $line =~ ^fix(\(.*\))?:\ (.*) ]]; then
              FIXES+="* ${BASH_REMATCH[2]}"$'\n'
            elif [[ $line =~ ^(perf|refactor|improvement|chore|i18n)(\(.*\))?:\ (.*) ]]; then
              IMPROVEMENTS+="* ${BASH_REMATCH[3]}"$'\n'
            elif [[ ! $line =~ ^(docs|test|ci|build|style|revert)(\(.*\))?:\ (.*) ]]; then
              OTHERS+="* $line"$'\n'
            fi
          done <<< "$COMMITS"

          shopt -u nocasematch

          NOTES="## 更新"$'\n'

          if [ -n "$FEATURES" ]; then
            NOTES+="### ✨ 新增"$'\n'
            NOTES+="$FEATURES"
          fi

          if [ -n "$FIXES" ]; then
            NOTES+="### 🐛 修复"$'\n'
            NOTES+="$FIXES"
          fi

          if [ -n "$IMPROVEMENTS" ]; then
            NOTES+="### 🔄 改进"$'\n'
            NOTES+="$IMPROVEMENTS"
          fi

          if [ -n "$OTHERS" ]; then
            NOTES+="### 📝 其他"$'\n'
            NOTES+="$OTHERS"
          fi

          NOTES+="***"$'\n'
          if [ -n "$PREVIOUS_VERSION" ]; then
            NOTES+="[完整更新日志](https://github.com/${{ github.repository }}/compare/${PREVIOUS_VERSION}...$TAG)"
          else
            NOTES+="完整更新日志"
          fi

          NOTES_FILE=$(mktemp)
          printf '%s\n' "$NOTES" > "$NOTES_FILE"
          echo "notes_file=$NOTES_FILE" >> "$GITHUB_OUTPUT"

      - name: 创建 GitHub Release 并上传产物
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: v${{ needs.check-version.outputs.version }}
          PRERELEASE: ${{ needs.check-version.outputs.prerelease }}
        run: |
          # 随二进制一并附上示例配置，便于部署。
          FILES=(artifacts/* server_config.example.yml)
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Release $TAG 已存在，覆盖上传产物"
            gh release upload "$TAG" "${FILES[@]}" --clobber --repo "$GITHUB_REPOSITORY"
          else
            ARGS=(--title "$TAG" --notes-file "${{ steps.notes.outputs.notes_file }}" --target "$GITHUB_SHA" --repo "$GITHUB_REPOSITORY")
            [ "$PRERELEASE" = "true" ] && ARGS+=(--prerelease)
            gh release create "$TAG" "${FILES[@]}" "${ARGS[@]}"
          fi
          echo "✅ 已发布 GitHub Release $TAG（tag 打在本次 bump 提交上）"

  # 复用 release 镜像流水线，把刚发布的 Release（含构建产物）同步到 CNB。
  sync-cnb:
    needs: [check-version, release]
    if: needs.check-version.outputs.should_release == 'true'
    uses: ./.github/workflows/sync-cnb-release.yml
    with:
      tag: v${{ needs.check-version.outputs.version }}
    secrets: inherit
