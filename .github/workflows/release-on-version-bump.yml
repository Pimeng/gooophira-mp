name: 版本号变更时自动发布

# Go 项目的版本号唯一来源是 internal/version/VERSION（参见 internal/version/version.go）。
# push 到 main 且该文件版本相对「上一个提交」升高时，创建 GitHub Release，并直接调用
# sync-cnb-release.yml 把该 Release 镜像到 CNB。
on:
  push:
    branches: [main]
    paths:
      - internal/version/VERSION

concurrency:
  group: release-on-version-bump-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  check-version:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write # 需要创建 tag / Release
    outputs:
      should_release: ${{ steps.check.outputs.should_release }}
      version: ${{ steps.check.outputs.version }}
      prerelease: ${{ steps.check.outputs.prerelease }}
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 需要父提交来比对版本

      - name: 比对 VERSION 是否相对上一提交升高
        id: check
        run: |
          current=$(tr -d ' \t\r\n' < internal/version/VERSION)
          echo "version=$current" >> "$GITHUB_OUTPUT"

          # 关键：与「当前提交的父提交」HEAD~1（即上一个提交）比对，而非 github.event.before。
          # 一次 push 多个提交时 before 会指向更早的提交；用 HEAD~1 才严格对应上一个提交。
          # 因此版本号 bump 应作为该次 push 的最新提交（建议单独成一个提交）。
          previous=""
          if git rev-parse -q --verify HEAD~1 >/dev/null 2>&1; then
            previous=$(git show HEAD~1:internal/version/VERSION 2>/dev/null | tr -d ' \t\r\n')
          fi
          [ -z "$previous" ] && previous="0.0.0" # 首个提交无父提交
          echo "上一提交版本：$previous → 当前版本：$current"

          # 版本比较用 sort -V（version sort）：两者较大者等于当前且不相等 → 视为升高。
          if [ "$current" = "$previous" ]; then
            should_release=false
          elif [ "$(printf '%s\n%s\n' "$previous" "$current" | sort -V | tail -n1)" = "$current" ]; then
            should_release=true
          else
            should_release=false
          fi
          echo "should_release=$should_release" >> "$GITHUB_OUTPUT"

          # 版本号带 '-'（如 0.1.0-rc.1）视为预发布。
          case "$current" in *-*) prerelease=true ;; *) prerelease=false ;; esac
          echo "prerelease=$prerelease" >> "$GITHUB_OUTPUT"

          if [ "$should_release" = "true" ]; then
            echo "✅ 版本升高，准备发布 v$current（预发布=$prerelease）"
          else
            echo "ℹ️ 版本未升高（$previous → $current），跳过发布"
          fi

      - name: 创建 GitHub Release
        if: steps.check.outputs.should_release == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: v${{ steps.check.outputs.version }}
          PRERELEASE: ${{ steps.check.outputs.prerelease }}
        run: |
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Release $TAG 已存在，跳过创建"
            exit 0
          fi
          # tag 打在本次 bump 的提交上，保证发版点准确。
          ARGS=(--title "$TAG" --generate-notes --target "$GITHUB_SHA" --repo "$GITHUB_REPOSITORY")
          [ "$PRERELEASE" = "true" ] && ARGS+=(--prerelease)
          gh release create "$TAG" "${ARGS[@]}"
          echo "✅ 已创建 GitHub Release $TAG"

  # 复用 release 镜像流水线把刚创建的 Release 同步到 CNB。
  sync-cnb:
    needs: check-version
    if: needs.check-version.outputs.should_release == 'true'
    uses: ./.github/workflows/sync-cnb-release.yml
    with:
      tag: v${{ needs.check-version.outputs.version }}
    secrets: inherit
