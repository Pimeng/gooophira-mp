<!doctype html>
<html lang="zh-CN" data-theme="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Crect width='16' height='16' rx='3' fill='%230c1016'/%3E%3Cpath d='M4 5l3 3-3 3' stroke='%233fdc97' stroke-width='1.6' fill='none' stroke-linecap='round' stroke-linejoin='round'/%3E%3Cpath d='M8.5 11.2h3.5' stroke='%233fdc97' stroke-width='1.6' stroke-linecap='round'/%3E%3C/svg%3E">
<title>Phira MP 服务端控制台</title>
<link rel="stylesheet" href="/gui/guipage.css">

</head>
<body>

<div id="login">
  <form class="login-box" id="loginForm">
    <h1>PHIRA MP 服务端控制台</h1>
    <p>请输入管理员令牌（ADMIN_TOKEN）</p>
    <input id="tokenInput" type="password" placeholder="admin token" autocomplete="current-password">
    <button type="submit">进 入</button>
    <div id="loginErr"></div>
  </form>
</div>

<div id="app" class="hidden">
  <header>
    <div class="brand">
      <span class="dot off" id="connDot"></span>
      <div>
        <h1 id="srvName">Phira MP</h1>
        <span class="sub" id="srvSub">v- · -</span>
      </div>
    </div>
    <div class="head-right">
      <div class="hstat"><label>运行时间</label><b id="uptime">--:--:--</b></div>
      <div class="hstat"><label>连接</label><b id="connText" aria-live="polite">未连接</b></div>
      <button id="themeToggle" class="head-btn" type="button" title="切换深浅色" aria-label="切换深浅色主题">☀</button>
      <button id="logout" class="head-btn" type="button">退出</button>
    </div>
  </header>

  <main>
    <aside>
      <section class="panel">
        <h2>性能监控</h2>
        <div class="chartwrap" id="memWrap">
          <canvas id="memChart" height="64"></canvas>
          <div class="crosshair" id="memCross"></div>
          <div class="cdot" id="memDot"></div>
          <div class="ctip" id="memTip"></div>
        </div>
        <div class="cap"><span>内存 <b id="memNow">-</b></span><span id="memDetail">-</span></div>
        <div class="chartwrap" id="cpuWrap">
          <canvas id="cpuChart" height="64"></canvas>
          <div class="crosshair" id="cpuCross"></div>
          <div class="cdot" id="cpuDot"></div>
          <div class="ctip" id="cpuTip"></div>
        </div>
        <div class="cap"><span>CPU <b id="cpuNow">-</b></span><span id="cpuDetail">-</span></div>
        <div class="counters">
          <div class="counter"><b id="cUsers">0</b><label>在线玩家</label></div>
          <div class="counter"><b id="cRooms">0</b><label>活跃房间</label></div>
          <div class="counter"><b id="cSessions">0</b><label>活跃会话</label></div>
          <div class="counter"><b id="cWs">0</b><label>WS 连接</label></div>
        </div>
      </section>
      <section class="panel grow">
        <div class="tabs" role="tablist" aria-label="房间与玩家">
          <button type="button" id="tabRooms" class="active" role="tab" aria-selected="true" aria-controls="roomList">房间</button>
          <button type="button" id="tabPlayers" role="tab" aria-selected="false" aria-controls="playerList">玩家</button>
        </div>
        <div id="roomList" class="list" role="tabpanel" aria-label="房间列表"><div class="loading"><div class="skel"></div><div class="skel"></div><div class="skel"></div></div></div>
        <div id="playerList" class="list hidden" role="tabpanel" aria-label="玩家列表"><div class="loading"><div class="skel"></div><div class="skel"></div><div class="skel"></div></div></div>
      </section>
    </aside>

    <section class="panel console">
      <div class="console-head">
        <h2>控制台</h2>
        <span class="chint">help 查看全部 · Tab 补全 · ↑↓ 历史</span>
      </div>
      <div id="log" role="log" aria-live="polite" aria-label="服务器日志与命令行">
        <form id="cmdForm" class="cmdline">
          <span class="prompt" aria-hidden="true">&gt;</span>
          <label class="sr" for="cmdInput">控制台命令</label>
          <input id="cmdInput" placeholder="输入命令…" autocomplete="off" spellcheck="false">
        </form>
      </div>
      <button id="jumpBtn" class="jump" type="button">↓ 最新</button>
    </section>
  </main>
</div>


<script src="/gui/guipage.js"></script>
</body>
</html>
