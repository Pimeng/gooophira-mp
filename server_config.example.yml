# 监听地址
HOST: "::"
# 监听端口
PORT: 12346

# 是否启用 HTTP 服务
HTTP_SERVICE: false
# HTTP 服务监听端口
HTTP_PORT: 12347

# 是否在启动时打开服务端 GUI 窗口（类似 Minecraft 服务端 GUI）
# 含性能监控、房间/玩家数据和可执行命令的控制台；启用时自动开启 HTTP 服务
# 也可通过启动参数 --gui 开启；窗口自动登录，无需输入 ADMIN_TOKEN
# GUI: true

# HTTP CORS 允许的来源列表
# 配置后，只有列表中的来源才能通过浏览器访问 HTTP API
# 不配置或为空数组时，不返回 CORS 头（浏览器默认禁止跨域）
# 配置为 ["*"] 时显式允许所有来源；生产环境强烈建议限制为管理面板等可信来源
CORS_ORIGINS:
  - "https://t.phira.link"
  - "http://localhost:5173"

# HTTP API 单 IP 限流：窗口内最大请求数，默认 100
# HTTP_RATE_LIMIT_MAX_REQUESTS: 100
# HTTP API 限流窗口（毫秒），默认 60000（1 分钟）
# HTTP_RATE_LIMIT_WINDOW_MS: 60000

# 日志等级：DEBU、INFO、MARK、WARN、ERRO（兼容旧名 DEBUG/ERROR），默认 INFO
LOG_LEVEL: INFO

# 日志维护（按天切分的历史日志的压缩与清理；当天正在写入的日志永不处理）
# 历史日志超过该天数后自动 gzip 压缩（日志重复率高，压缩可大幅降低占用）；填 0 关闭压缩，默认 14
# 最近 N 天日志保持明文，方便直接查看；更早的压缩为 .log.gz
# LOG_COMPRESS_AFTER_DAYS: 14
# 日志目录总占用上限（MB）；超过后从最旧的日志开始删除直到回落，填 0 表示不限制，默认 500
# LOG_MAX_TOTAL_MB: 500

# 服务端语言：zh-CN、en-US，影响日志/CLI/HTTP 默认输出语言
# 优先级：ENV PHIRA_MP_LANG > ENV LANG > 此项 > 默认（zh-CN）
LANG: zh-CN

# 真实 IP 头名称，用于反向代理场景，默认空（关闭）
# 只有部署在可信反向代理/CDN 之后才启用，否则客户端可伪造 IP 绕过限流/封禁
# 可选值例如：X-Forwarded-For、X-Real-IP、CF-Connecting-IP
# 注意：这里只对 HTTP 服务生效
# REAL_IP_HEADER: X-Forwarded-For

# 是否启用 HAProxy PROXY Protocol 支持
# 注意：用于 TCP 代理场景下获取真实 IP
HAPROXY_PROTOCOL: false

# 单房间最大用户数，默认 32
# ROOM_MAX_USERS: 32

# 是否允许玩家创建新房间，默认允许
# 可通过 CLI `roomcreation on|off` 或 API /admin/room-creation/config 在运行时切换
# 运行时切换会自动写回本文件（保留注释），重启后保持
# ROOM_CREATION_ENABLED: true

# 对局进行中断线的重连宽限时长（秒），默认 5
# 移动端弱网/切后台时不再立即判定离开本局，这么多秒内可重连回原局继续
# 当其他玩家都已完成、仅在等这名断线玩家时，会广播提示并倒计时（上限 120 秒）
# 填 0 关闭宽限，恢复旧行为：对局中断线立即判定离开本局
# PLAYING_RECONNECT_GRACE: 5

# 全服同时存在的房间数上限；不配置或填 0 表示不限制
# 小内存机器建议设置，防止房间过多导致 OOM
# MAX_ROOMS: 200

# 全服同时在线的 TCP 连接数上限；不配置或填 0 表示不限制
# 用于防止连接洪水/资源耗尽（与单 IP 连接限速 CONNECTION_RATE_LIMIT 互补）
# MAX_CONNECTIONS: 2000

# 单个 IP 在每 10 秒窗口内允许的新建 TCP 连接数，默认 30；超过后该 IP 临时封禁 30 秒
# 用于抵御来自单一来源的连接洪水（窗口与封禁时长固定，本项只调阈值）
# 注意：回环地址（127.0.0.1/::1）豁免本限速——本机压测/同机反代/本地 GUI 不会被误封；
# 若部署在远端反代/CDN/NAT 之后玩家共享同一上游 IP，请相应调高本值或改在反代侧限速
# CONNECTION_RATE_LIMIT: 30

# 是否启用会话级命令限流，默认启用
# 对已认证连接内的聊天/房间/选谱/上报成绩等命令做令牌桶限流，防止刷屏聊天淹没房间、
# 或借大量不同谱面/成绩 ID 放大对 Phira API 的请求。实时游戏数据(触控/判定)与心跳不受限。
# 默认阈值刻意宽松，正常游玩不会触发；内网或比赛等可信场景可设为 false 关闭。
# COMMAND_RATE_LIMIT: true

# 是否启用聊天，默认开启；关闭后玩家聊天会替换为安全提示
CHAT_ENABLED: true

# 是否启用回放录制功能，默认关闭
# 启用后，对局会自动录制为 .phirarec 文件
# 可通过 API /admin/replay/config 动态开关
REPLAY_ENABLED: false
# 回放录制目录，默认 ./record
# REPLAY_BASE_DIR: "./record"
# 回放文件保留天数，超过后每天凌晨自动清理，默认 4；磁盘紧张可调小，需长期留存可调大
# REPLAY_TTL_DAYS: 4

# 是否启用游戏结束后自动上传回放到分享站，默认 false
# 仅当同时配置了 SHARE_STATION 时实际生效
# 关闭后，即使用户在客户端开启了自动上传偏好，服务端也不会执行上传
REPLAY_AUTO_UPLOAD: false

# 系统消息发送者用户 ID，默认 0（客户端按「系统」渲染）
# 用于所有系统聊天消息（MsgChat.User）的发送者 ID：欢迎语、回放/迟到提示、
# 管理员广播、维护通知、本局结算等。同时也是回放假观战者的身份 ID：
# - 未配置（0）：假观战者用固定 ID（2_000_000_000）+ 本地化名「回放录制器（系统）」，
#   系统聊天发送者按 MsgChat.User=0 渲染为「系统」，两者不同名。
# - 配置真实 ID（>0）：服务端异步调用 /user/:id 拉取该账号公开昵称，假观战者改用
#   该真实 ID + 真实昵称（拉取完成前用「回放录制器（系统）」兜底），系统聊天发送者
#   也用同一 ID，进出包与聊天发送者均呈现为 bot 真实昵称，统一为 bot 身份。
#   建议配置一个不会实际登录服务器的专用 bot 账号 ID，避免与真实在线用户冲突。
# SYSTEM_USER_ID: 0

# 观战用户 ID（示例值，生产环境替换为实际的管理员用户 ID 列表）
MONITORS:
  - 2

# 测试账号 ID 列表：配置后，这些账号的日志默认不写入文件
# 默认值：[1739989]
TEST_ACCOUNT_IDS:
  - 1739989

# 服务器名称，会显示在欢迎信息中
SERVER_NAME: Phira MP

# 管理接口鉴权 token（HTTP /admin/*）
# 建议通过 X-Admin-Token 或 Authorization: Bearer 头传递
# ADMIN_TOKEN: "replace_me"

# 是否允许从 URL 查询参数（?token=）中提取管理 token，默认 false
# 安全警告：启用会使得 token 出现在服务器日志、代理日志、浏览器历史中
# 仅当你的管理脚本不支持自定义请求头时才启用此项
# ALLOW_TOKEN_IN_QUERY: false

# 管理数据持久化路径（JSON）
# ADMIN_DATA_PATH: "./admin_data.json"

# 登录后房间列表后追加显示的提示文案
# ROOM_LIST_TIP: "欢迎加入交流群：123456；查房间：example.com"

# Phira API 端点地址，用于用户认证、获取谱面、获取成绩记录等
# 默认：https://phira.5wyxi.com
PHIRA_API_ENDPOINT: "https://phira.5wyxi.com"

# 一言 API 地址，用于欢迎消息中的随机句子
HITOKOTO_API_URL: "https://v1.hitokoto.cn/"

# 服务端出站代理配置
# 不配置：保持当前环境里的默认代理行为
# false / False：强制直连，不走代理
# http(s)://... / socks://...：强制使用指定代理
# OUTBOUND_PROXY: false
# OUTBOUND_PROXY: "http://127.0.0.1:7890"

# 出站 HTTP 网络层配置（主要影响 Android/Termux 等无本地 stub resolver 环境）
# DNS_SERVERS：Android 平台公共 DNS 服务器列表（含端口），按顺序回退；
# 不配置或为空时使用内置默认 [1.1.1.1:53, 8.8.8.8:53]。非 Android 平台忽略此项。
# 环境变量：NETUTIL_DNS_SERVERS=1.1.1.1:53,8.8.8.8:53（逗号/空格/分号分隔）
# NETUTIL:
#   DNS_SERVERS:
#     - "1.1.1.1:53"
#     - "8.8.8.8:53"

# Phira Replay 分享站配置（用于上传回放到分享站）
SHARE_STATION:
  # 分享站地址
  URL: "http://183.66.27.19:40004"
  # 服务端认证 token（用于自动上传等内部接口）
  # 如需Token，请访问 https://rymc.ltd/e 询问 Evidence 相关Token事宜
  TOKEN: "your_share_station_token_here"

# Redis 缓存配置
# 启用后，本地缓存（玩家鉴权 token、成绩记录等）将迁移到 Redis，多实例共享并按 TTL 过期
REDIS:
  # 是否启用 Redis 缓存，默认 false
  ENABLED: false
  # Redis 服务器地址
  HOST: "127.0.0.1"
  # Redis 服务器端口
  PORT: 6379
  # Redis 认证密码（如无密码可留空或注释）
  # PASSWORD: "your_redis_password"
  # Redis 数据库号，默认 0
  DB: 0

# Webhook 事件通知：把对局/房间/维护等事件外发到群机器人（通用 JSON / Discord / OneBot v11 / 飞书）
# 异步投递、失败重试，不阻塞对局；支持热重载（改本块即时生效）
# WEBHOOK:
#   ENABLED: true
#   # 单次请求超时（毫秒），默认 5000
#   TIMEOUT_MS: 5000
#   # 失败重试次数（仅对 5xx/429/网络错误重试），默认 2
#   RETRIES: 2
#   TARGETS:
#     # 载荷格式 TYPE：generic（结构化 JSON，便于自定义机器人）| discord | onebot_v11 | feishu
#     - URL: "https://discord.com/api/webhooks/xxx/yyy"
#       TYPE: discord
#       # 订阅的事件类型；省略或留空 = 订阅全部
#       # 可选：room_create room_disband user_join maintenance
#       EVENTS: [room_create, room_disband, maintenance]

#     # OneBot v11 经 HTTP API 发送内置格式的纯文本消息（auto_escape=true，不解析 CQ 码）。
#     # URL 填 OneBot HTTP API 根地址；ACCESS_TOKEN 对应 OneBot 的 access token，无鉴权时可省略。
#     - TYPE: onebot_v11
#       URL: "http://127.0.0.1:5700"
#       ACCESS_TOKEN: "your_onebot_access_token"
#       MESSAGE_TYPE: group  # private（私聊）或 group（群聊）
#       TARGET_ID: 123456789 # private 时填 QQ 号，group 时填群号
#       EVENTS: [game_start, game_end]

#     # 飞书走开放平台 SDK（不经 webhook URL，改用应用凭据 + 接收人）。
#     # 模板 ID 与版本号均有内置默认（game_start / game_end 各一个），也可分别覆盖：
#     #   TEMPLATE_ID / TEMPLATE_VERSION 覆盖 game_start 模板
#     #   GAME_END_TEMPLATE_ID / GAME_END_TEMPLATE_VERSION 覆盖 game_end 模板
#     # game_start 模板变量：room_id/chart_name/player_list/chart_difficulty/chart_charter/chart_pic
#     #   （chart_pic 由事件 ImageURL 字段指向的图片经飞书上传图片接口换取 image_key 后填入）。
#     # game_end 模板变量：room_id/player_score_rank
#     #   （player_score_rank 是数组对象，格式为 [{"player":"Alice","score":9521,"std_score":9478},...]，按 score 降序）。
#     # LIVE_UPDATE 开启成绩卡片流式更新：首个玩家提交成绩时发送卡片，后续成绩 PATCH 实时刷新，
#     #   对局结束做最终 PATCH 后清理状态。开启后自动订阅 score_submitted、game_end 和清理事件。
#     - TYPE: feishu
#       APP_ID: "cli_xxxxxxxxxxxx"
#       APP_SECRET: "your_app_secret"
#       RECEIVE_OPEN_ID: "ou_xxxxxxxxxxxx"
#       # TEMPLATE_ID: ""                    # 可选：覆盖 game_start 模板 ID
#       # TEMPLATE_VERSION: "1.0.2"           # 可选：覆盖 game_start 模板版本
#       # GAME_END_TEMPLATE_ID: ""           # 可选：覆盖 game_end 模板 ID
#       # GAME_END_TEMPLATE_VERSION: "1.0.1"  # 可选：覆盖 game_end 模板版本
#       # LIVE_UPDATE: true                   # 可选：开启成绩实时刷新（默认 false）
#       # 可选：订阅的事件类型；省略或留空 = 订阅全部
#       # 可选：room_create room_disband user_join maintenance score_submitted
#       # （score_submitted 仅在 LIVE_UPDATE 开启时自动投递，无需显式列出）
#       EVENTS: [game_start, game_end]
#     - URL: "https://example.com/hook"
#       TYPE: generic
#       # 可选：配置后请求带 X-Phira-Signature: sha256=<HMAC(body)> 头，供接收端校验来源
#       SECRET: "your_shared_secret"

# 统计数据库路径（SQLite），默认 stats.db
# STATS_DB_PATH: "stats.db"
# 统计数据明细保留天数，超过后自动清理，默认 90
# STATS_DETAIL_RETENTION_DAYS: 90
# 统计数据库文件大小上限（MB），超过后从最旧记录开始清理，默认 500
# STATS_DB_MAX_MB: 500
